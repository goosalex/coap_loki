description: Toshiba TB67H453 Motor Driver
compatible: "toshiba,tb67h453"
include: base.yaml

properties:
    pwms:
        required: true
        type: phandle-array
        description: Two PWM channels (IN1, IN2)
    sleep-gpios:
        required: true
        type: phandle-array
        description: Pin connected to SLEEP (Active High)
