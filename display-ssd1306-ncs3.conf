# Configure LVGL and display settings for the nRF52840 with SSD1306 display
# Route LVGL allocations through the libc heap instead of a dedicated static pool.
# When no display is detected at boot, lvgl_init() bails out before lv_init() and
# no allocations are made, leaving the memory free for other code.
CONFIG_LV_Z_MEM_POOL_HEAP_LIB_C=y
CONFIG_LV_Z_SHELL=y

CONFIG_I2C=y
CONFIG_I2C_NRFX=y
CONFIG_LOG=y

CONFIG_DISPLAY=y
CONFIG_DISPLAY_LOG_LEVEL_ERR=y

CONFIG_SSD1306=y
CONFIG_LVGL=y

CONFIG_LV_CONF_MINIMAL=y
CONFIG_LV_USE_LOG=y
CONFIG_LV_USE_LABEL=y


CONFIG_LV_FONT_MONTSERRAT_14=y

CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_APP_LINK_WITH_LVGL=y

CONFIG_LOG=y
CONFIG_SHELL=y

CONFIG_LVGL=y
CONFIG_LV_USE_LOG=y
CONFIG_LV_USE_LABEL=y                                                                                                                                                                                         
CONFIG_LV_USE_ARC=y
CONFIG_LV_USE_MONKEY=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_UNSCII_8=y

# One of these three is crucial for t he display to work
CONFIG_LV_USE_THEME_DEFAULT=y
CONFIG_LV_Z_VDB_SIZE=64
# monochrome display
CONFIG_LV_COLOR_DEPTH_1=y


# Drives lv_task_handler() from the dedicated animate_ip_scroll thread
# (see src/displays/1306_display.c). Must be > 0 — value 0 selects a
# sysworkq-based path that overflows the 2 KB system workqueue stack.
CONFIG_LVGL_DISPLAY_UPDATE_PERIOD_MS=10

CONFIG_I2C_SHELL=ymm 