# makes no sense if UART is desibled
# CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_RING_BUFFER=y
CONFIG_PWM=y

# Motor driver used by DT alias motor0 (/motor_driver)
CONFIG_DC_MOTOR=y


# Increased stack due to settings API usage
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
# from mesh sample
CONFIG_BT_SETTINGS=y

CONFIG_BT=y
CONFIG_LOG=y
CONFIG_BT_SMP=y
# deprecated
# CONFIG_BT_SIGNING=y

CONFIG_BT_PERIPHERAL=y

# Device Information Service (0x180A). The strings below are what generic BLE
# debuggers (nRF Connect, BlueZ, LightBlue) render above the custom
# fcbd0001-… service, so a human reading the device card immediately knows
# what they're looking at even though the custom service UUID itself is
# opaque to any tool without a local UUID mapping.
#
# CONFIG_BT_DIS_SETTINGS lets the application override the static strings at
# boot via settings_runtime_set("bt/dis/<key>", str, strlen(str)) — that's
# what main.c does for FW/SW revisions, sourcing them from APP_VERSION_* so
# the value shown in a debugger tracks the actual firmware build.
#
# Note: this NCS (3.2.x) has no CONFIG_BT_DIS_STR_USER. CONFIG_BT_DIS_SETTINGS
# is the equivalent — same outcome (runtime-mutable DIS strings), different
# mechanism (Zephyr settings subsystem rather than a dedicated bt_dis_set_str
# API). It depends on CONFIG_SETTINGS=y which is already enabled above.
CONFIG_BT_DIS=y
CONFIG_BT_DIS_SETTINGS=y
CONFIG_BT_DIS_MANUF_NAME=y
CONFIG_BT_DIS_MANUF_NAME_STR="Loki"
CONFIG_BT_DIS_MODEL_NUMBER=y
CONFIG_BT_DIS_MODEL_NUMBER_STR="Locomotive Control"
CONFIG_BT_DIS_FW_REV=y
CONFIG_BT_DIS_FW_REV_STR="dev"           # overwritten at boot from APP_VERSION
CONFIG_BT_DIS_SW_REV=y
CONFIG_BT_DIS_SW_REV_STR="dev"           # overwritten at boot from APP_VERSION
# CONFIG_BT_DIS_HW_REV / _STR intentionally not set — the firmware targets
# multiple boards (52dk, custom, dongle, promicro) so HW revision should
# come from a board-specific overlay if it matters.

CONFIG_BT_ATT_PREPARE_COUNT=5
CONFIG_BT_BAS=y
# from samples/bluetooth/peripheral/
CONFIG_BT_PRIVACY=y
CONFIG_BT_DEVICE_NAME="Zephyr Peripheral Sample Long Name"
# Experimental: (and therefore throws KConfig Warnings and stops build)
# CONFIG_BT_IAS=y
#CONFIG_BT_DEVICE_APPEARANCE=833
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=65
CONFIG_BT_SETTINGS=y
CONFIG_BT_RX_STACK_SIZE=4096
CONFIG_BT_EXT_ADV=n
CONFIG_BT_GATT_SERVICE_CHANGED=y

CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y

CONFIG_DEBUG_OPTIMIZATIONS=y 
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# If MCU hangs on startup in settings_load. Claude recommends:
# CONFIG_FLASH_LOG_LEVEL_DBG=y

# Wipe-on-version-change is enabled by default in Kconfig
# (CONFIG_LOKI_CLEAR_SETTINGS_NEW_VERSION=y). Uncomment below to wipe on
# every new build number too (CONFIG_LOKI_CLEAR_SETTINGS_NEW_BUILD=n by
# default) or to disable the version-change wipe once the settings schema
# is stable.
# CONFIG_LOKI_CLEAR_SETTINGS_NEW_BUILD=y
# CONFIG_LOKI_CLEAR_SETTINGS_NEW_VERSION=n

CONFIG_PINCTRL_DYNAMIC=y
CONFIG_PINCTRL_NRF=y

CONFIG_GPIO=y

# Newlib was previously forced on solely to provide sscanf("%d", …) in the CoAP
# speed handler — that cost ~36 KB of flash for one decimal parse. The handler
# now uses strtoul (minimal-libc / picolibc) and every sprintf has been swapped
# for snprintk / strcpy, so the default Zephyr libc is sufficient.
# CONFIG_NEWLIB_LIBC=y
# CONFIG_NEWLIB_LIBC_NANO=n

CONFIG_LOKI_MOTOR1PIN=9

# To be able to read the same address as on the sticker on the back of the board
CONFIG_HW_ID_LIBRARY=y
CONFIG_HW_ID_LIBRARY_SOURCE_BLE_MAC=y

CONFIG_OPENTHREAD_SRP_CLIENT=y


CONFIG_OPENTHREAD_JOINER=y
CONFIG_OPENTHREAD_SLAAC=y
CONFIG_CPP=y

