# makes no sense if UART is desibled
# CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_RING_BUFFER=y
CONFIG_PWM=y

# Motor driver used by DT alias motor0 (/motor_driver)
CONFIG_DC_MOTOR=y


# Increased stack due to settings API usage
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
# from mesh sample
CONFIG_BT_SETTINGS=y

CONFIG_BT=y
CONFIG_LOG=y
CONFIG_BT_SMP=y
# deprecated
# CONFIG_BT_SIGNING=y

CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DIS=y
CONFIG_BT_ATT_PREPARE_COUNT=5
CONFIG_BT_BAS=y
# from samples/bluetooth/peripheral/
CONFIG_BT_PRIVACY=y
CONFIG_BT_DEVICE_NAME="Zephyr Peripheral Sample Long Name"
# Experimental: (and therefore throws KConfig Warnings and stops build)
# CONFIG_BT_IAS=y
#CONFIG_BT_DEVICE_APPEARANCE=833
CONFIG_BT_DEVICE_NAME_DYNAMIC=y
CONFIG_BT_DEVICE_NAME_MAX=65
CONFIG_BT_SETTINGS=y
CONFIG_BT_RX_STACK_SIZE=4096
CONFIG_BT_EXT_ADV=n
CONFIG_BT_GATT_SERVICE_CHANGED=y

CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y

CONFIG_DEBUG_OPTIMIZATIONS=y 
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# If MCU hangs on startup in settings_load. Claude recommends:
# CONFIG_FLASH_LOG_LEVEL_DBG=y

# Wipe-on-version-change is enabled by default in Kconfig
# (CONFIG_LOKI_CLEAR_SETTINGS_NEW_VERSION=y). Uncomment below to wipe on
# every new build number too (CONFIG_LOKI_CLEAR_SETTINGS_NEW_BUILD=n by
# default) or to disable the version-change wipe once the settings schema
# is stable.
# CONFIG_LOKI_CLEAR_SETTINGS_NEW_BUILD=y
# CONFIG_LOKI_CLEAR_SETTINGS_NEW_VERSION=n

CONFIG_PINCTRL_DYNAMIC=y
CONFIG_PINCTRL_NRF=y

CONFIG_GPIO=y

CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=n

CONFIG_LOKI_MOTOR1PIN=9

# To be able to read the same address as on the sticker on the back of the board
CONFIG_HW_ID_LIBRARY=y
CONFIG_HW_ID_LIBRARY_SOURCE_BLE_MAC=y

CONFIG_OPENTHREAD_SRP_CLIENT=y


CONFIG_OPENTHREAD_JOINER=y
CONFIG_OPENTHREAD_SLAAC=y
CONFIG_CPP=y

