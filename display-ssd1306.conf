# Configure LVGL and display settings for the nRF52840 with SSD1306 display
CONFIG_LV_Z_MEM_POOL_SIZE=16384


CONFIG_I2C=y
CONFIG_I2C_NRFX=y
CONFIG_LOG=y

CONFIG_DISPLAY=y
CONFIG_DISPLAY_LOG_LEVEL_ERR=y

CONFIG_SSD1306=y
CONFIG_LVGL=y

CONFIG_LV_CONF_MINIMAL=y
CONFIG_LV_USE_LOG=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_BTN=y
CONFIG_LV_USE_IMG=y
CONFIG_LV_FONT_MONTSERRAT_14=y

CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_APP_LINK_WITH_LVGL=y

CONFIG_LOG=y
CONFIG_SHELL=n
CONFIG_LV_Z_SHELL=n
CONFIG_I2C_SHELL=n

CONFIG_LVGL=y
CONFIG_LV_USE_LOG=y
CONFIG_LV_USE_LABEL=y                                                                                                                                                                                         
CONFIG_LV_USE_BTN=y
CONFIG_LV_USE_ARC=y
CONFIG_LV_USE_IMG=y
CONFIG_LV_USE_MONKEY=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_UNSCII_8=y

# One of these three is crucial for t he display to work
CONFIG_LV_USE_THEME_DEFAULT=y
CONFIG_LV_Z_VDB_SIZE=64
# monochrome display
CONFIG_LV_COLOR_DEPTH_1=y


#Custom setting for scrolling the IPv6 address (does not work with the current NCS version)
#CONFIG_LVGL_DISPLAY_UPDATE_PERIOD_MS=5
CONFIG_LVGL_DISPLAY_UPDATE_PERIOD_MS=0
