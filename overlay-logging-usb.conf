# Enable net module logging
# CONFIG_NET_LOG=y
# Option for configuring log level in net config library
# CONFIG_NET_CONFIG_LOG_LEVEL_INF=y

# Option for configuring log level in Zephyr L2 logging
# CONFIG_OPENTHREAD_L2_DEBUG=y
# CONFIG_OPENTHREAD_L2_LOG_LEVEL_DBG=y
# CONFIG_OPENTHREAD_L2_DEBUG_DUMP_15_4=y
# CONFIG_OPENTHREAD_L2_DEBUG_DUMP_IPV6=y

# Configure sample logging setting
CONFIG_LOG=y
CONFIG_LOG_PRINTK=y
CONFIG_COAP_SERVER_LOG_LEVEL_DBG=y
CONFIG_OT_COAP_UTILS_LOG_LEVEL_DBG=y
CONFIG_OPENTHREAD_DEBUG=y
CONFIG_OPENTHREAD_L2_DEBUG=y

CONFIG_DISPLAY_LVGL_LOG_LEVEL_DBG=y

# Enable Mbed TLS logging
# CONFIG_OPENTHREAD_MBEDTLS_DEBUG=y
# CONFIG_MBEDTLS_DEBUG_LEVEL=3

# Option for configuring log level in OpenThread
CONFIG_OPENTHREAD_LOG_LEVEL_DEBG=n

CONFIG_MPSL_LOG_LEVEL_DBG=y

# Enable UART over USB logging backend
# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# # LEgacy USB
# CONFIG_USB_DEVICE_STACK=y
# CONFIG_USB_DEVICE_PRODUCT="nRF52840 CDC ACM"
# CONFIG_USB_CDC_ACM=y

# # Console over USB
# CONFIG_SERIAL=y
# CONFIG_CONSOLE=y
# CONFIG_UART_CONSOLE=y  

# NEXT_USB , apparently default in v3.2 
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
# NCS urges me to set another PID here than the default Nordic one 
CONFIG_CDC_ACM_SERIAL_PID=0x0004
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="USBD console sample"


# Logging backend
CONFIG_LOG_BACKEND_UART=y

# Recommended
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=4096

# Optional but useful
CONFIG_PRINTK=y

# Enable UART logging backend
CONFIG_LOG_BACKEND_UART=y
CONFIG_SHELL_LOG_BACKEND=y